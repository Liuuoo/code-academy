# Code Academy 静态站部署
# nginx 托管 VitePress 构建产物（docs/.vitepress/dist）。
#
# 端口：直接占用宿主机 80（已确认空闲）。Cloudflare 走 80 回源。
#   如需改回避让端口，把 "80:80" 改成 "8090:80" 之类即可。
#
# 用法：
#   1) 本地 npm run build 生成 docs/.vitepress/dist
#   2) 把整个项目（至少 dist + deploy）传到服务器
#   3) 服务器上：docker compose -f deploy/docker-compose.yml up -d

services:
  web:
    image: nginx:1.27-alpine
    container_name: code-academy-web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../docs/.vitepress/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
