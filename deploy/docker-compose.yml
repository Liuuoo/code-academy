# Code Academy 静态站部署
# nginx 托管 VitePress 构建产物（docs/.vitepress/dist）。
#
# 端口说明：
#   默认映射到宿主机 8080，避免与现有项目的 80/443 冲突。
#   - 若服务器 80 端口空闲、想直接对外，把 "8080:80" 改成 "80:80"。
#   - 若已有 nginx/Caddy 反代，让反代把子域名转发到 127.0.0.1:8080 即可。
#
# 用法：
#   1) 本地 npm run build 生成 docs/.vitepress/dist
#   2) 把整个项目（至少 dist + deploy）传到服务器
#   3) 服务器上：docker compose -f deploy/docker-compose.yml up -d

services:
  web:
    image: nginx:1.27-alpine
    container_name: code-academy-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../docs/.vitepress/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
