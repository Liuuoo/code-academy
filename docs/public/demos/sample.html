<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>冒泡排序演示</title>
<style>
  body {
    margin: 0;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #fbfaf8;
    color: #2c2c2c;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 20px;
  }
  .bars { display: flex; align-items: flex-end; gap: 4px; height: 200px; }
  .bar {
    width: 24px;
    background: #3a5a8c;
    border-radius: 3px 3px 0 0;
    transition: height 0.25s ease, background 0.25s ease;
  }
  .bar.active { background: #c0563b; }
  button {
    font: inherit;
    padding: 8px 20px;
    border: 1px solid #3a5a8c;
    background: #3a5a8c;
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: default; }
</style>
</head>
<body>
  <div class="bars" id="bars"></div>
  <button id="run">开始排序</button>
  <script>
    const wrap = document.getElementById('bars');
    const btn = document.getElementById('run');
    let data = [5, 2, 8, 1, 9, 3, 7, 4, 6];
    function render(active = []) {
      wrap.innerHTML = '';
      data.forEach((v, i) => {
        const b = document.createElement('div');
        b.className = 'bar' + (active.includes(i) ? ' active' : '');
        b.style.height = v * 20 + 'px';
        wrap.appendChild(b);
      });
    }
    const sleep = (ms) => new Promise(r => setTimeout(r, ms));
    async function bubble() {
      btn.disabled = true;
      for (let i = 0; i < data.length; i++) {
        for (let j = 0; j < data.length - i - 1; j++) {
          render([j, j + 1]);
          await sleep(220);
          if (data[j] > data[j + 1]) {
            [data[j], data[j + 1]] = [data[j + 1], data[j]];
            render([j, j + 1]);
            await sleep(220);
          }
        }
      }
      render();
      btn.disabled = false;
    }
    btn.addEventListener('click', bubble);
    render();
  </script>
</body>
</html>
