<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>上传 · Code Academy 后台</title>
<style>
  :root{--accent:#3a5a8c;--morandi:#bd7b6c}
  *{box-sizing:border-box}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#fbfaf8;
    color:#2c2c2c;margin:0;line-height:1.6}
  header{display:flex;align-items:center;justify-content:space-between;
    padding:1rem 1.5rem;border-bottom:1px solid #e8e4dd;background:#fff}
  header h1{font-size:1.05rem;margin:0;font-weight:600}
  header a{color:#888;text-decoration:none;font-size:.85rem}
  main{max-width:680px;margin:2rem auto;padding:0 1.2rem}
  .drop{border:2px dashed #cfc8bd;border-radius:12px;padding:2.5rem 1rem;text-align:center;
    background:#fff;color:#888;cursor:pointer;transition:.2s}
  .drop.over{border-color:var(--morandi);background:rgba(189,123,108,.05);color:var(--morandi)}
  .drop strong{color:#444}
  .file-name{margin-top:.8rem;font-size:.9rem;color:var(--accent)}
  label{display:block;font-size:.85rem;font-weight:600;margin:1.2rem 0 .35rem;color:#555}
  input,select{width:100%;padding:.55rem .7rem;border:1px solid #ddd;border-radius:6px;
    font-size:.95rem;background:#fff}
  .row{display:flex;gap:.8rem}.row>div{flex:1}
  .hint{font-size:.78rem;color:#999;margin-top:.3rem}
  .actions{margin-top:1.8rem;display:flex;gap:.8rem;align-items:center}
  button{padding:.6rem 1.4rem;border:0;border-radius:6px;font-size:.95rem;cursor:pointer}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-ghost{background:transparent;border:1px solid #ccc;color:#555}
  .msg{margin-top:1.2rem;padding:.8rem 1rem;border-radius:8px;font-size:.9rem;display:none}
  .msg.ok{background:rgba(58,106,74,.1);color:#3a6a4a;display:block}
  .msg.err{background:rgba(180,89,58,.1);color:#b4593a;display:block}
  fieldset{border:1px solid #eee;border-radius:8px;padding:.6rem 1rem 1rem;margin-top:1rem}
  legend{font-size:.8rem;color:#888;padding:0 .4rem}
</style>
</head>
<body>
<header>
  <h1>内容上传</h1>
  <div><a href="/build-status" id="buildLink">查看构建</a> &nbsp; <a href="/logout">退出</a></div>
</header>
<main>
  <div class="drop" id="drop">
    <strong>拖拽文件到这里</strong> 或点击选择<br>
    <span class="hint">支持 .md 笔记 / .pdf / .html 演示页</span>
    <div class="file-name" id="fileName"></div>
    <input type="file" id="fileInput" accept=".md,.pdf,.html,.htm" hidden>
  </div>

  <label>标题（留空则用文件名或首个标题）</label>
  <input type="text" id="title" placeholder="例：笔记 12 · 循环结构">

  <label>板块</label>
  <select id="section"></select>

  <div class="row">
    <div>
      <label>栏（二级分类）</label>
      <select id="col"></select>
      <input type="text" id="newCol" placeholder="新建栏名，如 零基础班" style="margin-top:.4rem;display:none">
    </div>
    <div>
      <label>框（三级分类）</label>
      <select id="box"></select>
      <input type="text" id="newBox" placeholder="新建框名，如 周六下午班" style="margin-top:.4rem;display:none">
    </div>
  </div>

  <fieldset>
    <legend>新建框时的可选信息</legend>
    <div class="row">
      <div><label>框描述</label><input type="text" id="groupDesc" placeholder="一句话介绍"></div>
      <div><label>标签</label><input type="text" id="groupTag" placeholder="如 进行中"></div>
    </div>
  </fieldset>

  <div class="actions">
    <button class="btn-primary" id="submit">发布并上线</button>
    <button class="btn-ghost" id="rebuild">仅重新发布</button>
  </div>
  <div class="msg" id="msg"></div>

  <hr style="margin:2.5rem 0;border:none;border-top:1px solid var(--vp-c-divider,#e2e2e2)">

  <section id="manage">
    <h2 style="font-size:1.05rem;margin:0 0 1rem">管理 · 删除文章</h2>
    <div class="row">
      <div>
        <label>板块</label>
        <select id="mSection"></select>
      </div>
      <div>
        <label>栏</label>
        <select id="mCol"></select>
      </div>
      <div>
        <label>框</label>
        <select id="mBox"></select>
      </div>
    </div>
    <div style="display:flex;gap:.5rem;margin-top:.5rem">
      <button id="renCol" class="btn-ghost" style="font-size:.8rem;padding:.3rem .8rem">重命名当前栏</button>
      <button id="renBox" class="btn-ghost" style="font-size:.8rem;padding:.3rem .8rem">重命名当前框</button>
    </div>
    <ul id="docList" style="list-style:none;padding:0;margin:1rem 0 0"></ul>
    <div class="msg" id="mMsg"></div>
  </section>
</main>
<script src="/upload.js"></script>
</body>
</html>
